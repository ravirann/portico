# AVAILABILITY HARVEST — the robust "seconds-not-minutes" scheduling read.
#
# Instead of replaying Epic's anti-replay/anti-forgery-protected requests (which
# fails — GetSchedulingWorkflowData's nonce is single-use), we work WITH the page:
# it makes the GetSlots call itself (with valid tokens), and we PASSIVELY INTERCEPT
# the JSON response. This is Libretto's recommended strategy for protected sites.
#
# The moment the appointment times render, we've captured EVERY open slot as
# structured data — no scraping — and we pick one by policy. DISCOVERY ONLY:
# it reads availability and stops; it never reserves and never books.
#
# Flow of control:
#   navigate → register interceptor → (you log in + select) → pick earliest slot
key: portal-availability
version: 1
description: Harvest MyChart open slots from the page's own GetSlots response, pick by policy. Never books.
inputs:
  slot_preference: string?    # "earliest" (default) | "on-or-after:YYYY-MM-DD"

guard:
  no_booking: true
  forbidden_actions: ["ReserveAppointment", "Verify and schedule", "book", "confirm"]
  dry_run_only: true

steps:
  - type: navigate
    label: Open the scheduling page
    url: "{{base_url}}/MyChart/Scheduling"

  # Register the passive listener BEFORE the selection that triggers GetSlots.
  # It captures the latest GetSlots JSON the page fetches into `slots_raw`.
  - type: intercept
    label: Capture the page's GetSlots response
    intercept:
      url_contains: "/Scheduling/GetSlots"
      as: slots_raw

  # You drive the selection — the page makes GetSlots with valid tokens for free.
  - type: human
    label: "Log in (+2FA), then choose specialty → reason → location until appointment TIMES appear, then press Enter"

  # Pick one slot by policy from the harvested availability. Never reserved/booked.
  - type: select
    label: Pick the slot matching slot_preference
    select:
      from: "slots_raw.Solutions.0.Slots"
      policy: "{{slot_preference}}"
      by: DisplayDateTimeUtc
      compare: date
      as: chosen_slot
# Output = slots_raw (every open slot, as structured JSON) + chosen_slot (the pick).
# No reserve step exists and ReserveAppointment is forbidden → nothing is booked.
