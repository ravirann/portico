# API-TIER AVAILABILITY READ — the promoted, "seconds-not-minutes" scheduling flow.
# Reads open MyChart appointment slots by INTENT (specialty/reason/location), via
# Epic's own JSON endpoints, then picks one by policy. DISCOVERY ONLY — it reads
# availability and stops; it never reserves and never books.
#
# Authored from a real network capture (scripts/record-network.mjs → analyze).
# Endpoints, params, and response fields below are the actual ones MyChart uses.
#
# ── VALIDATION CHECKLIST (confirm on the first 1–2 live runs) ──────────────────
#   [ ] read.csrf / read.browser_id expressions — where Epic exposes each token
#   [ ] read.specialty_options selector — the specialty picker's option list
#   [ ] GetSpecialtyData header name for the anti-forgery token
#   [ ] GetSlots appointmentBuilder.SpecialtyId — short id vs encrypted form
#   [ ] ReasonForVisitValue / provider-department pairing for multi-provider specialties
# Each is tagged « VALIDATE » at its step. The engine capabilities (resolve→id,
# read, select, form-api) are unit-tested; these are the site-specific unknowns.
key: portal-availability
version: 1
description: Read MyChart open slots by intent via the API tier, pick by policy. Never books.
inputs:
  specialty: string           # e.g. "Primary Care"
  reason: string              # e.g. "New Patient Adult Visit (18 and over)"
  location: string            # e.g. "Southview" (resolved against real options)
  slot_preference: string?    # "earliest" (default) | "on-or-after:YYYY-MM-DD"

guard:
  no_booking: true
  forbidden_actions: ["ReserveAppointment", "Verify and schedule", "book", "confirm"]
  dry_run_only: true

steps:
  - type: subflow
    use: portal-login                                    # persistent-profile login

  - type: navigate
    label: Open the scheduling wizard (mints the session context)
    url: "{{base_url}}/MyChart/Scheduling"

  # ── Lift the session tokens the API calls must echo. « VALIDATE » expressions.
  - type: read
    label: Read the anti-forgery token
    read:
      expression: "document.querySelector('input[name=\"__RequestVerificationToken\"]')?.value || ''"
      as: csrf
  - type: read
    label: Read the workflow BrowserId
    read:
      expression: "window.__MyChartBrowserId || document.querySelector('[name=\"workflow.BrowserId\"]')?.value || ''"
      as: browser_id
  - type: read
    label: Read the client time zone
    read:
      expression: "Intl.DateTimeFormat().resolvedOptions().timeZone"
      as: client_tz

  # ── specialty → SpecialtyId, resolved against the wizard's own options. « VALIDATE » selector.
  - type: read
    label: List specialty options on the page
    read:
      expression: "[...document.querySelectorAll('[data-specialty-id]')].map(e=>({Title:e.textContent.trim(),Value:e.getAttribute('data-specialty-id')}))"
      as: specialty_options
  - type: resolve
    label: specialty → SpecialtyId (refuse if ambiguous)
    resolve: { input: "{{specialty}}", candidates: specialty_options, match_on: Title, value_field: Value, as: specialty_id }

  # ── API TIER: one call loads providers, departments, reasons, and pairs.
  - type: extract
    label: Load specialty scheduling data (API)
    api:
      url: "{{base_url}}/MyChart/Scheduling/GetSpecialtyData"
      method: POST
      bodyType: form
      headers: { verificationtoken: "{{csrf}}" }         # « VALIDATE » header name
      body: { SpecialtyId: "{{specialty_id}}" }
    extract:
      key: specialty_data
      schema: { type: object }

  # ── Resolve reason + location to the ids GetSlots needs, from the REAL arrays
  #    GetSpecialtyData returns. resolveIntent refuses rather than guess.
  - type: resolve
    label: reason → VisitTypeId
    resolve: { input: "{{reason}}", candidates: "specialty_data.ReasonsForVisit", match_on: Title, value_field: DefaultVisitTypeId, as: visit_type_id }
  - type: resolve
    label: reason → ReasonForVisitId
    resolve: { input: "{{reason}}", candidates: "specialty_data.ReasonsForVisit", match_on: Title, value_field: Id, as: reason_id }
  - type: resolve
    label: location → DepartmentId
    resolve: { input: "{{location}}", candidates: "specialty_data.Locations", match_on: Name, value_field: ID, as: department_id }
  - type: select
    label: Provider-department pair for the visit          # « VALIDATE » filter by department for multi-provider specialties
    select: { from: "specialty_data.ProviderDepartmentPairs", policy: first, as: pair }

  # ── Resolve the reason-for-visit line token (needed by GetSlots).
  - type: extract
    label: Load deferred scheduling data (API)
    api:
      url: "{{base_url}}/MyChart/Scheduling/GetDeferredSchedulingData"
      method: POST
      bodyType: form
      headers: { verificationtoken: "{{csrf}}" }
      body:
        schedulingParameters.reasonForVisitId: "{{reason_id}}"
        schedulingParameters.specialtyId: "{{specialty_id}}"
        workflow.Type: "2"
        workflow.BrowserId: "{{browser_id}}"
    extract:
      key: deferred
      schema: { type: object }

  # ── THE PROMOTED READ: all open slots in one sub-second call. Body params and
  #    keys are the exact ones captured from the live GetSlots request.
  - type: extract
    label: Read available slots (API tier)
    api:
      url: "{{base_url}}/MyChart/Scheduling/GetSlots"
      method: POST
      bodyType: form
      headers: { verificationtoken: "{{csrf}}" }
      body:
        workflow.Type: "2"
        workflow.IsGuest: "false"
        workflow.IsAnonymous: "false"
        workflow.IsFromPrelogin: "false"
        workflow.IsAuthenticatedWidget: "false"
        workflow.BrowserId: "{{browser_id}}"
        "appointmentBuilder.Appointments[0].VisitTypeId": "{{visit_type_id}}"
        "appointmentBuilder.Appointments[0].ProviderDepartmentPairs[0].ProviderId": "{{pair.ProviderId}}"
        "appointmentBuilder.Appointments[0].ProviderDepartmentPairs[0].DepartmentId": "{{pair.DepartmentId}}"
        "appointmentBuilder.Appointments[0].ProviderDepartmentPairs[0].IsTeamMember": "false"
        "appointmentBuilder.Appointments[0].Slot": ""
        "appointmentBuilder.Appointments[0].SearchStartDte": ""
        "appointmentBuilder.Appointments[0].SelectedTelehealthMode": "0"
        "appointmentBuilder.Appointments[0].CanSkipLicensureCheck": "false"
        appointmentBuilder.ReasonForVisitLine: "{{deferred.ReasonForVisitLineId}}"
        appointmentBuilder.SpecialtyId: "{{specialty_id}}"        # « VALIDATE » encrypted vs short id
        appointmentBuilder.ClientIANATimeZone: "{{client_tz}}"
        startDte: ""
        useSchedulingPreferences: "false"
    extract:
      key: slots_raw
      schema: { type: object }

  # ── Pick one slot by policy (earliest by default). Never reserved, never booked.
  - type: select
    label: Pick the slot matching slot_preference
    select:
      from: "slots_raw.Solutions.0.Slots"
      policy: "{{slot_preference}}"
      by: DisplayDateTimeUtc
      compare: date
      as: chosen_slot
# Ends here. Output carries slots_raw (all availability) + chosen_slot. No reserve
# step exists and ReserveAppointment is forbidden → nothing is booked, by construction.
