# Scheduling flow — GOAL-DRIVEN, DISCOVERY ONLY. You pass the *intent* (what kind
# of appointment, for whom); the flow *discovers* availability and reserves a slot
# by *policy*. It never books — it stops at the review screen, by construction.
#
# Why goal-driven: you never know the exact open slot ahead of time. So `slot` is
# NOT an input — `slot_preference` is (a policy like "earliest"). Availability is
# read from the portal's own API (the "API tier"), which returns the real open
# slots as structured JSON in one sub-second call — no DOM scraping, no model.
#
# ── Two-phase authoring (capture → analyze network requests) ──
#   Phase 1 · CAPTURE  : scripts/record-network.mjs drives the flow once and logs
#                        every request to .portico/sessions/<s>/network.jsonl.
#   Phase 2 · ANALYZE  : scripts/analyze-network.mjs surfaces the clean JSON read
#                        endpoint (the availability call) to promote below.
#   The `api:` step's url/body/schema are filled from that capture — you cannot
#   know a portal's endpoint without observing its traffic; that IS the profiling.
#
# The reserve/review steps use the real accessible labels captured from the live
# review screen, and the booking button stays forbidden (defense in depth).
key: portal-schedule
version: 1
description: Discover MyChart availability via the API tier and reserve a slot by policy. Never books.
inputs:
  specialty: string           # intent — from the task/ticket, e.g. "Primary Care"
  reason: string              # intent — e.g. "New Patient Adult Visit (18 and over)"
  location: string            # intent — e.g. "Southview Internal Medicine"
  slot_preference: string?    # policy — "earliest" (default) | "on-or-after:YYYY-MM-DD"

guard:
  no_booking: true
  forbidden_actions: ["Verify and schedule", "book", "confirm", "submit appointment"]
  dry_run_only: true

steps:
  - type: subflow
    use: portal-login                       # reuse the trusted session (or paused HITL login)

  - type: navigate
    label: Open the scheduling wizard
    url: "{{base_url}}/MyChart/Scheduling"

  # ── INTENT RESOLUTION: task data is messy ("Southview", "primary care"), so
  #    canonicalize each intent against the portal's REAL options before using it.
  #    Candidates come from the picker's rendered options or a location-list API
  #    (FILL from the Phase-1/2 capture). resolveIntent refuses (fails the run)
  #    rather than guessing when the input is ambiguous — e.g. "Southview" when the
  #    portal has both "Southview Internal Medicine" and "Southview Pediatrics".
  - type: extract
    label: List the location options the portal offers
    locator: { semantic: { role: button, intent: "the selectable clinic/location options" } }
    extract:
      key: location_options            # e.g. ["Southview Internal Medicine", "Brighton Family Medicine", …]
      schema: { type: array, items: { type: string } }
  - type: resolve
    label: Canonicalize the location (refuse if ambiguous)
    resolve:
      input: "{{location}}"            # e.g. "Southview"
      candidates: location_options
      as: location_canonical          # → exact portal string, used downstream
      on_ambiguous: fail
  # (Same pattern applies to specialty/reason — omitted here for brevity.)

  # ── API TIER: read real availability in one call. Runs via Portico's pageRequest
  #    inside the authenticated page context (session cookies + TLS reused), so it
  #    is sub-second and needs no DOM and no model. FILL url/method/body from the
  #    Phase-2 analysis of the recorded availability request; the schema below is
  #    the target shape — adjust field names to the actual JSON response.
  - type: extract
    label: List available slots (API tier)
    api:
      url: "{{base_url}}/FILL_FROM_RECORDING"     # e.g. /MyChart/scheduling/GetOpenScheduleSlots
      method: POST                                # copy method + body from the recorded request
      responseType: json
    extract:
      key: available_slots
      schema:
        type: array
        items:
          type: object
          properties:
            date:       { type: string }
            time:       { type: string }
            provider:   { type: string }
            location:   { type: string }
            slot_token: { type: string }          # opaque, time-bound reservation token

  # ── SELECT by policy: pick the slot matching slot_preference (default earliest).
  #    Finalized in Phase 2 against the real response shape — this is where the
  #    goal ("earliest available") resolves to a concrete slot without hardcoding.
  #    (Selection over available_slots → exposes {{selected.*}} for the next step.)

  # ── RESERVE on the DOM (NOT book): slot reservation is guarded by the opaque,
  #    time-bound token above ("reserved for you until …") and rotating anti-CSRF
  #    tokens, so it stays on the resilient DOM path rather than a blind replay.
  - type: act
    label: Reserve the selected time slot
    locator: { semantic: { role: button, name: "{{selected.label}}", intent: "select the chosen appointment time" } }

  # ── On the review screen the selections are "Edit … selection …" buttons.
  - type: extract
    label: Read the reserved appointment summary
    locator: { semantic: { intent: "the specialty, reason, location, and time on the review screen" } }
    extract:
      key: reserved_appointment
      schema:
        type: object
        properties:
          specialty: { type: string }
          reason:    { type: string }
          location:  { type: string }
          time:      { type: string }

  - type: assert
    label: Reached the review screen (booking button present, not clicked)
    condition: page_loaded
# Ends on the review screen. No "Verify and schedule" step exists → nothing books.
