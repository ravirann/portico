# Reusable, 2FA-aware auth subflow.
# First run: HITL 2FA once → trusted session persisted. Later runs skip auth.
key: portal-login
version: 1
description: Log into the portal; handle 2FA once and persist the trusted session.
steps:
  - type: navigate
    url: "{{base_url}}"
  - type: act
    label: Enter username
    value: "{{secrets.username}}"      # injected at runtime, redacted in traces
    locator: { semantic: { role: textbox, name: "Username", intent: "the username field" } }
  - type: act
    label: Enter password
    value: "{{secrets.password}}"
    locator: { semantic: { role: textbox, name: "Password", intent: "the password field" } }
  - type: act
    label: Submit login
    locator: { semantic: { role: button, name: "Sign In", intent: "the sign-in button" } }
  # 2FA branch: authenticator-app → totp step; otherwise HITL once.
  - type: human
    label: Complete 2FA if challenged
    condition: two_factor_challenge_present
  - type: assert
    label: Logged in
    # PLACEHOLDER — supported forms: "page_loaded", "url_contains:<text>",
    # "text_visible:<text>", "selector_visible:<css>", "output_present:<key>".
    # Adjust to a URL fragment (or visible text) that only appears once
    # logged in, e.g. "url_contains:/dashboard" or "text_visible:Welcome".
    condition: "url_contains:/dashboard"
# On success the engine persists the trusted-device session back to the vault.
