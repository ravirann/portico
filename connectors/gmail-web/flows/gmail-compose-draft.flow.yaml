# LIVE-VALIDATED 2026-07-11 against mail.google.com (Chrome 149): the Compose,
# To-recipients, Subject and Message-Body locators below all resolved and the
# draft autosaved ("Draft saved"). Recipient/subject/body confirmed in the draft.
#
# WRITE INTENT — composes a draft and NEVER sends. `guard.dry_run_only` keeps
# this flow out of live runs entirely, and "send" is a hard `forbidden_actions`
# entry as defense in depth even if that guard is ever loosened later. Gmail
# AUTOSAVES the draft as you type — there is no explicit save (Ctrl+S opens the
# browser's Save-page dialog, so it is deliberately NOT used); the flow just
# asserts Gmail's own "Draft saved" confirmation. No Send button is ever located.
key: gmail-compose-draft
version: 1
description: Compose a Gmail draft (recipient, subject, body) and autosave it. Never sends.
inputs:
  recipient: string
  subject: string
  body: string

guard:
  dry_run_only: true
  forbidden_actions: ["send"]

steps:
  - type: subflow
    use: gmail-login                          # reuse the persisted --profile session (or paused HITL login)

  - type: act
    label: Open a new compose window
    locator: { semantic: { role: button, name: "Compose", intent: "start a new message" } }

  - type: act
    label: Address the recipient
    method: type                              # "To" is an autocomplete/chip combobox; needs real keystrokes to register
    value: "{{recipient}}"
    locator: { semantic: { role: combobox, name: "To recipients", intent: "the To recipients field" } }

  - type: act
    label: Commit the recipient chip and move to the next field
    method: press
    value: "Tab"

  - type: act
    label: Enter the subject
    method: fill                              # plain text input — fill() is fine here (contrast the body step below)
    value: "{{subject}}"
    locator: { semantic: { role: textbox, name: "Subject", intent: "the subject field" } }

  - type: act
    label: Enter the message body
    # contenteditable editor: fill() sets the DOM value directly and does NOT
    # fire the keystroke/input events Gmail's editor listens on; type() does.
    method: type
    value: "{{body}}"
    locator: { semantic: { role: textbox, name: "Message Body", intent: "the compose message body" } }

  # Read back the composed body as this flow's data product. `evaluateValidation`
  # (packages/engine/src/validate-flow.ts) fails any flow with zero
  # intercept/select/extract outputs, so a write-intent flow validated on its own
  # — unlike gmail-login, only ever consumed via `subflow` — needs one. This uses
  # a CACHED (deterministic) locator on the contenteditable body: it reads the
  # element's text with NO extract model required. (An earlier draft used a
  # model-only semantic extract, which now hard-fails when no heal model is set.)
  - type: extract
    label: Read back the composed body (confirms the message was entered)
    locator:
      cached: '[role="textbox"][aria-label="Message Body"]'
      semantic: { role: textbox, name: "Message Body", intent: "the compose message body" }
    extract:
      key: draft_body
      schema: { type: string }

  # No explicit save step: Gmail autosaves as you type. The extract above (and
  # the sector pacing) give it a beat; then we assert Gmail's own confirmation.
  - type: assert
    label: Draft saved
    condition: text_visible:Draft saved        # LIVE-VALIDATED: this is Gmail's exact autosave copy
